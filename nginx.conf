server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    # The Faust WASM compiler is large; serve it with the correct MIME type and
    # cache it aggressively (filenames are content-hashed by Vite).
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Hashed build assets (js/css/data/wasm) never change under the same name.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html is the app entrypoint — always revalidate so deploys take effect.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
